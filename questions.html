<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الأسئلة - CSCA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body lang="ar">
    <div style="background:rgba(10,11,16,0.95); border-bottom:1px solid var(--glass-border); padding:8px 0;">
        <div class="container" style="display:flex; justify-content:flex-start; align-items:center; gap:15px;">
            <span style="color:var(--text-dim); font-size:0.85rem;">🌐</span>
            <div id="lang-switcher" class="lang-switcher"></div>
        </div>
    </div>

    <nav class="main-nav">
        <div class="container">
            <div class="nav-links">
                <a href="index.html" id="nav-home">الرئيسية</a>
                <a href="questions.html" class="active" id="nav-questions">بنك الأسئلة</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 class="section-title" style="margin-top:40px;" id="page-title">بنك الأسئلة التدريبية</h1>
        <p id="page-sub" style="color:var(--text-dim);">تدرب على 327 سؤالاً بمستويات صعوبة مختلفة</p>

        <div class="filter-container" id="subject-filters">
            <button class="filter-btn active" onclick="filterSub('all',this)">الكل</button>
            <button class="filter-btn" onclick="filterSub('رياضيات | Math',this)">📐 الرياضيات</button>
            <button class="filter-btn" onclick="filterSub('فيزياء | Physics',this)">⚡ الفيزياء</button>
            <button class="filter-btn" onclick="filterSub('كيمياء | Chemistry',this)">🧪 الكيمياء</button>
        </div>

        <div class="filter-container" id="diff-filters">
            <button class="filter-btn active" onclick="filterDiff('all',this)">الكل</button>
            <button class="filter-btn" onclick="filterDiff('easy',this)"><span style="color:#2ed573">●</span> سهل</button>
            <button class="filter-btn" onclick="filterDiff('medium',this)"><span style="color:#ffa502">●</span> متوسط</button>
            <button class="filter-btn" onclick="filterDiff('hard',this)"><span style="color:#ff4757">●</span> صعب</button>
        </div>

        <p style="color:var(--text-dim); margin:15px 0; font-size:0.9rem;" id="stats-line">0 سؤال</p>

        <div id="questions-list"></div>
    </main>

    <footer>
        <p>© 2026 أكاديمية عبد الحميد للتميز | المنهج الذهبي CSCA</p>
    </footer>

    <script>
    let lang = 'ar', allQ = [], activeSub = 'all', activeDiff = 'all';

    function getLang() {
        const s = localStorage.getItem('csca_lang');
        const u = new URLSearchParams(window.location.search).get('lang');
        lang = u || s || 'ar';
        if (!['ar','en','zh'].includes(lang)) lang = 'ar';
        localStorage.setItem('csca_lang', lang);
        document.documentElement.lang = lang;
        document.body.lang = lang;
    }
    function switchLang(to) {
        lang = to; localStorage.setItem('csca_lang', to);
        const u = new URL(window.location); u.searchParams.set('lang', to);
        window.location.href = u.toString();
    }
    function renderLang() {
        const c = document.getElementById('lang-switcher');
        if (!c) return; c.innerHTML = '';
        ['ar','en','zh'].forEach(l => {
            const b = document.createElement('button');
            b.className = 'lang-btn' + (l === lang ? ' active' : '');
            b.textContent = l === 'ar' ? '🇸🇦 عربي' : l === 'en' ? '🇬🇧 EN' : '🇨🇳 中文';
            b.onclick = () => switchLang(l);
            c.appendChild(b);
        });
    }

    // Text helpers
    function qText(q) { return q['question_' + lang] || q.question_ar || q.question_en || ''; }
    function expText(q) { return q['explanation_' + lang] || q.explanation_ar || q.explanation_en || ''; }
    function optText(o) { return lang === 'ar' ? o.text : (lang === 'zh' ? (o.text_zh || o.text) : o.text); }
    function subjText(s) {
        if (lang === 'ar') return s.split('|')[0].trim();
        if (lang === 'en') { if (s.includes('رياضيات')) return 'Math'; if (s.includes('فيزياء')) return 'Physics'; if (s.includes('كيمياء')) return 'Chemistry'; return s; }
        if (lang === 'zh') { if (s.includes('رياضيات')) return '数学'; if (s.includes('فيزياء')) return '物理'; if (s.includes('كيمياء')) return '化学'; return s; }
    }
    function diffText(d) {
        const m = {'easy':{ar:'سهل',en:'Easy',zh:'简单'},'medium':{ar:'متوسط',en:'Medium',zh:'中等'},'hard':{ar:'صعب',en:'Hard',zh:'困难'}};
        return (m[d] && m[d][lang]) || d;
    }
    function tagClass(s) {
        if (s.includes('رياضيات')||s.includes('Math')) return 'tag-math';
        if (s.includes('فيزياء')||s.includes('Physics')) return 'tag-phys';
        return 'tag-chem';
    }
    function correctText(q) {
        const o = q.options.find(o => o.label === q.correct);
        return o ? q.correct + '. ' + optText(o) : q.correct;
    }

    function showQ(id) {
        const d = document.getElementById('exp-' + id);
        if (d) d.open = !d.open;
    }

    function display(questions) {
        const el = document.getElementById('questions-list');
        el.innerHTML = '';
        if (!questions.length) {
            el.innerHTML = '<div class="card glass" style="text-align:center;padding:40px;"><p style="color:var(--text-dim);">📭 ' + (lang==='ar'?'لا توجد أسئلة':lang==='zh'?'没有找到问题':'No questions found') + '</p></div>';
            return;
        }
        questions.forEach(q => {
            const opts = q.options || [];
            const cards = document.createElement('div');
            cards.className = 'card glass question-card';
            cards.style.marginBottom = '20px';
            cards.innerHTML = `
                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px;">
                    <span class="tag ${tagClass(q.subject)}">${subjText(q.subject)}</span>
                    <span class="card-difficulty diff-${q.difficulty}">${diffText(q.difficulty)}</span>
                </div>
                <p style="font-size:1.1rem; margin-bottom:15px; font-weight:600;">${qText(q)}</p>
                <div style="margin:15px 0;">
                    ${opts.map((o,i) => `<label style="display:block; margin:8px 0; cursor:pointer; padding:8px 15px; border-radius:10px;" onmouseover="this.style.background='rgba(255,255,255,0.05)'" onmouseout="this.style.background=''">
                        <input type="radio" name="q${q.id}" style="margin-left:10px;" onchange="showQ(${q.id})"> ${o.label}. ${optText(o)}
                    </label>`).join('')}
                </div>
                <details id="exp-${q.id}">
                    <summary style="color:var(--primary); cursor:pointer; font-weight:bold;">💡 ${lang==='ar'?'عرض شرح الأستاذ':lang==='zh'?'查看教师讲解':'View Explanation'}</summary>
                    <div style="padding:20px; background:rgba(0,0,0,0.2); border-radius:12px; border-right:4px solid #2ed573;">
                        <p style="color:#2ed573; font-weight:bold; margin-bottom:10px;">${lang==='ar'?'الإجابة الصحيحة':lang==='zh'?'正确答案':'Correct Answer'}: ${correctText(q)}</p>
                        <p style="margin-top:10px;">${expText(q)}</p>
                    </div>
                </details>
            `;
            el.appendChild(cards);
        });
        document.getElementById('stats-line').textContent = questions.length + ' ' + (lang==='ar'?'سؤال':lang==='zh'?'道题':'questions');
        if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise();
    }

    function apply() {
        let f = [...allQ];
        if (activeSub !== 'all') f = f.filter(q => q.subject === activeSub);
        if (activeDiff !== 'all') f = f.filter(q => q.difficulty === activeDiff);
        display(f);
    }

    function filterSub(sub, btn) {
        activeSub = sub;
        document.querySelectorAll('#subject-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        apply();
    }
    function filterDiff(diff, btn) {
        activeDiff = diff;
        document.querySelectorAll('#diff-filters .filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        apply();
    }

    async function init() {
        getLang();
        renderLang();
        try {
            const r = await fetch('data/questions.json');
            allQ = await r.json();
            apply();
        } catch(e) {
            document.getElementById('questions-list').innerHTML = '<div class="error-msg" style="text-align:center;padding:40px;color:var(--danger);">❌ فشل تحميل الأسئلة</div>';
        }
    }
    init();
    </script>
</body>
</html>
