<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك الأسئلة - أكاديمية CSCA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .filter-container {
            margin: 30px 0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--card-bg);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .question-card {
            margin-bottom: 20px;
        }

        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 5px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .tag-math {
            background: var(--secondary);
        }

        .tag-phys {
            background: var(--accent);
        }

        .tag-chem {
            background: #4ade80;
        }
    </style>
</head>

<body>
    <header class="main-nav">
        <div class="container">
            <a href="index.html">الرئيسية</a>
            <a href="questions.html" class="active">بنك الأسئلة</a>
            <a href="#about">حول الاختبار</a>
        </div>
    </header>

    <main class="container">
        <h1 class="section-title" style="margin-top: 40px;">بنك الأسئلة التدريبية</h1>
        <p>تدرب على مجموعة متنوعة من الأسئلة المستوحاة من الاختبارات السابقة لرفع جاهزيتك.</p>

        <div class="filter-container">
            <button class="filter-btn active" onclick="filterQuestions('all')">الكل</button>
            <button class="filter-btn" onclick="filterQuestions('رياضيات | Math')">رياضيات</button>
            <button class="filter-btn" onclick="filterQuestions('فيزياء | Physics')">فيزياء</button>
            <button class="filter-btn" onclick="filterQuestions('كيمياء | Chemistry')">كيمياء</button>
        </div>

        <div id="questions-list">
            <!-- سيتم تحميل الأسئلة هنا بواسطة JS -->
        </div>
    </main>

    <script>
        let allQuestions = [];

        async function loadQuestions() {
            try {
                const response = await fetch('data/questions.json');
                allQuestions = await response.json();
                displayQuestions(allQuestions);
            } catch (e) {
                console.error("Failed to load questions", e);
            }
        }

        function displayQuestions(questions) {
            const list = document.getElementById('questions-list');
            list.innerHTML = '';

            questions.forEach(q => {
                let tagClass = 'tag-math';
                if (q.subject.includes('Physics')) tagClass = 'tag-phys';
                if (q.subject.includes('Chemistry')) tagClass = 'tag-chem';

                const card = document.createElement('div');
                card.className = 'card glass question-card';
                card.innerHTML = `
                    <span class="tag ${tagClass}">${q.subject}</span>
                    <p style="font-size: 1.1rem; margin-bottom: 15px;"><strong>${q.question}</strong></p>
                    <div style="margin: 15px 0; padding-right: 20px;">
                        ${q.options.map((opt, i) => `
                            <label style="display: block; margin: 10px 0; cursor: pointer;">
                                <input type="radio" name="q${q.id}" style="margin-right: 10px;"> ${opt}
                            </label>
                        `).join('')}
                    </div>
                    <details style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
                        <summary style="color: var(--primary); cursor: pointer; font-weight: bold;">💡 عرض شرح الأستاذ | View Teacher's Explanation</summary>
                        <div style="padding: 20px; background: rgba(0,0,0,0.2); margin-top: 15px; border-radius: 12px; border-right: 4px solid #4ade80;">
                            <p style="color: #4ade80; font-weight: bold; margin-bottom: 10px;">الإجابة الصحيحة: ${q.options[q.answer]}</p>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                                <div style="text-align: right;">
                                    <p style="font-size: 0.95rem; color: #fff;">${q.explanation}</p>
                                </div>
                                <div style="text-align: left; direction: ltr; color: #cbd5e1; font-size: 0.9rem; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 15px;">
                                    <p>${q.eng_explanation}</p>
                                </div>
                            </div>
                        </div>
                    </details>
                `;
                list.appendChild(card);
            });
            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function filterQuestions(subject) {
            // Update active state of buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                const btnSubj = btn.innerText;
                if (subject === 'all') {
                    btn.classList.toggle('active', btnSubj === 'الكل');
                } else {
                    btn.classList.toggle('active', subject.includes(btnSubj));
                }
            });

            if (subject === 'all') {
                displayQuestions(allQuestions);
            } else {
                const filtered = allQuestions.filter(q => q.subject === subject);
                displayQuestions(filtered);
            }
        }

        window.onload = loadQuestions;
    </script>
</body>

</html>
